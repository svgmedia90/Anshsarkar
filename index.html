<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansh Sarkar | VIP Cricket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: radial-gradient(circle at top, #0f2027, #203a43, #000);
    color:#fff;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter: blur(10px);
}

.logo{
    font-size:24px;
    font-weight:700;
    background:linear-gradient(90deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:#aaa;
}
nav a:hover{color:#00ffcc}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:55px;
    background:linear-gradient(90deg,#00ffcc,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}

.hero p{
    color:#bbb;
    margin:10px 0;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:30px;
    margin-top:25px;
    box-shadow:0 0 30px rgba(0,255,200,0.2);
}

/* BUTTON */
.btn{
    padding:15px 35px;
    border-radius:50px;
    background:linear-gradient(90deg,#00ffcc,#00aaff);
    color:#000;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #00ffcc;
}

/* URGENCY */
.urgency{
    color:#ff3b3b;
    font-weight:bold;
    margin-bottom:10px;
}

/* STATS */
.stats{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:25px;
}

.stat{
    margin:10px 20px;
    text-align:center;
}

.stat h2{
    color:#00ffcc;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#666;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">Ansh Sarkar</div>
    <div>
        <a href="#">Home</a>
        <a href="#">Results</a>
        <a href="#">VIP</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">

    <h1>Ansh Sarkar</h1>
    <p>Premium Cricket Prediction Community</p>

    <div class="card">

        <p class="urgency">⚡ Only Limited VIP Slots Left</p>

        <a href="https://t.me/+tCJ7o6DeNykyNDY1" target="_blank">
            <button class="btn">Join VIP Telegram 🚀</button>
        </a>

        <div class="stats">
            <div class="stat">
                <h2>95%+</h2>
                <p>Accuracy</p>
            </div>
            <div class="stat">
                <h2>50K+</h2>
                <p>Members</p>
            </div>
            <div class="stat">
                <h2>₹10L+</h2>
                <p>Profit</p>
            </div>
        </div>

    </div>

</section>

<footer>
© 2026 Ansh Sarkar | All Rights Reserved
</footer>

</body>
</html>
